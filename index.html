<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <canvas id="gameCanvas" width="400" height="600" tabindex="0"></canvas>
    <div id="overlay" class="overlay hidden">
      <h2 id="overlayTitle">Game Over</h2>
      <p id="overlayScore">Score: 0</p>
      <p class="hint">화면을 탭하여 다시 시작</p>
    </div>
    <p class="score-display">Score: <span id="score">0</span></p>
    <p class="instructions">탭 또는 스페이스바: 점프 · 5점마다 파이프 속도 UP</p>
  </div>
  <script src="game.js"></script>
</body>
</html>
